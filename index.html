<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas - Distrileco</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .vibras-positivas-footer {
            border-top: 2px solid #f3f4f6;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: #374151;
        }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white shadow-lg rounded-xl overflow-hidden">
        <div class="bg-blue-800 text-white p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">DISTRILECO S.A.S</h1>
                <p class="text-sm opacity-80">Gestión de Ventas - Panel Administrativo</p>
            </div>
            <div class="text-right">
                <input type="file" id="upload" class="hidden" accept=".xlsx, .csv">
                <label for="upload" class="bg-yellow-500 hover:bg-yellow-400 text-blue-900 px-4 py-2 rounded font-bold cursor-pointer transition">
                    Cargar gestionventas.xlsx
                </label>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 p-6 bg-gray-100" id="kpi-container">
            <div class="bg-white p-4 rounded shadow border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Venta Total</p>
                <h2 id="total-ventas" class="text-xl font-bold">$0</h2>
            </div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-green-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Promedio x Vendedor</p>
                <h2 id="promedio-vendedor" class="text-xl font-bold">$0</h2>
            </div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-purple-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Refs Impactadas</p>
                <h2 id="refs-impactadas" class="text-xl font-bold">0</h2>
            </div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-orange-500">
                <p class="text-gray-500 text-xs uppercase font-bold">Clientes Impactados</p>
                <h2 id="clientes-impactados" class="text-xl font-bold">0</h2>
            </div>
        </div>

        <div class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div>
                <h3 class="font-bold mb-4 text-gray-700">Ventas por Vendedor</h3>
                <canvas id="chartVendedores"></canvas>
            </div>
            <div>
                <h3 class="font-bold mb-4 text-gray-700">Participación de Proveedores (%)</h3>
                <canvas id="chartProveedores"></canvas>
            </div>
        </div>

        <footer class="vibras-positivas-footer">
            <p>app desarrollada por vibras positivas derechos de autor (3117700431)</p>
        </footer>
    </div>

    <script>
        document.getElementById('upload').addEventListener('change', handleFile, false);

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                
                // Buscamos la pestaña "data"
                const sheetName = workbook.SheetNames.find(n => n.toLowerCase() === 'data') || workbook.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                
                procesarInformes(jsonData);
            };
            reader.readAsArrayBuffer(file);
        }

        function procesarInformes(data) {
            let total = 0;
            let vendedores = {};
            let proveedores = {};
            let refs = new Set();
            let clientes = new Set();

            data.forEach(row => {
                const venta = parseFloat(row.tventas) || 0;
                const vend = row.vendedor || 'Desconocido';
                const prov = row.DESNUMPROVEE || 'Otros';
                
                total += venta;
                vendedores[vend] = (vendedores[vend] || 0) + venta;
                proveedores[prov] = (proveedores[prov] || 0) + venta;
                if(row.referencia) refs.add(row.referencia);
                if(row.nit) clientes.add(row.nit);
            });

            // Actualizar KPIs
            document.getElementById('total-ventas').innerText = '$' + total.toLocaleString();
            document.getElementById('clientes-impactados').innerText = clientes.size;
            document.getElementById('refs-impactadas').innerText = refs.size;
            
            const numVend = Object.keys(vendedores).length;
            document.getElementById('promedio-vendedor').innerText = '$' + (total / (numVend || 1)).toLocaleString();

            actualizarGraficos(vendedores, proveedores);
        }

        let chartV, chartP;
        function actualizarGraficos(vendData, provData) {
            if(chartV) chartV.destroy();
            if(chartP) chartP.destroy();

            // Gráfico Vendedores
            const ctxV = document.getElementById('chartVendedores').getContext('2d');
            chartV = new Chart(ctxV, {
                type: 'bar',
                data: {
                    labels: Object.keys(vendData),
                    datasets: [{ label: 'Ventas $', data: Object.values(vendData), backgroundColor: '#1e40af' }]
                }
            });

            // Gráfico Proveedores
            const ctxP = document.getElementById('chartProveedores').getContext('2d');
            chartP = new Chart(ctxP, {
                type: 'pie',
                data: {
                    labels: Object.keys(provData),
                    datasets: [{ data: Object.values(provData), backgroundColor: ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'] }]
                }
            });
        }
    </script>
</body>
</html>
