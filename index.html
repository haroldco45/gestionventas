<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Consolidado - Distrileco</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .vibras-positivas-footer { border-top: 2px solid #e2e8f0; text-align: center; padding: 15px; font-weight: bold; color: #475569; margin-top: 20px; font-size: 13px; }
        .btn-whatsapp { background-color: #25D366; color: white; padding: 10px 20px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; border-radius: 99px; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-whatsapp:hover { background-color: #128C7E; transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-6">

    <div class="max-w-[1400px] mx-auto space-y-4">
        <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-xl flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-yellow-500">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black tracking-tighter italic">DISTRILECO S.A.S</h1>
                <p class="text-xs text-blue-300 uppercase font-bold tracking-widest">Informes Consolidados por Vendedor</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <label class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold cursor-pointer shadow-md hover:bg-green-500 transition uppercase text-sm">
                    📂 Cargar gestionventas.xlsx
                    <input type="file" id="upload" class="hidden" accept=".xlsx, .csv">
                </label>
                <div id="totalClientesCard" class="bg-blue-800 px-4 py-1 rounded-lg text-xs font-bold border border-blue-400 hidden">
                    Total Clientes Impactados: <span id="totalClientesVal">0</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-600">
                <label class="text-xs font-black text-blue-900 uppercase">1. Filtrar Proveedor:</label>
                <select id="selProv" class="w-full mt-1 p-2 bg-blue-50 border rounded-lg font-bold text-blue-800" onchange="procesar()"><option value="">TODOS LOS PROVEEDORES</option></select>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-slate-400">
                <label class="text-xs font-black text-slate-600 uppercase">2. Filtrar Vendedor:</label>
                <select id="selVend" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg font-bold text-slate-700" onchange="procesar()"><option value="">TODOS LOS VENDEDORES</option></select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider">
                        <tr>
                            <th class="p-4">Vendedor</th>
                            <th class="p-4">Detalle por Proveedor (Neto)</th>
                            <th class="p-4 text-right bg-blue-800">Neto Total</th>
                            <th class="p-4 text-right">Clientes</th>
                            <th class="p-4 text-right">Prom. Cliente</th>
                            <th class="p-4 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody" class="text-sm divide-y divide-slate-100 font-medium">
                        <tr><td colspan="6" class="p-20 text-center text-slate-400 font-bold italic">Cargue el archivo para generar el envío consolidado...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="vibras-positivas-footer">
            app desarrollada por vibras positivas derechos de autor (3117700431)
        </footer>
    </div>

    <script>
        let rawData = [];
        const contactos = {
            "03": { nombre: "ALEXANDER SANCHEZ", cel: "573218037260" },
            "04": { nombre: "JUAN CARLOS QUINTANA", cel: "573204077185" },
            "06": { nombre: "LORENZO CASTELLAR", cel: "573113896092" },
            "07": { nombre: "ARGENIS MEZA", cel: "573122960169" },
            "10": { nombre: "GELYDIS ENAMORADO", cel: "573135031118" },
            "17": { nombre: "ROBERT ATENCIA", cel: "573022107387" },
            "22": { nombre: "JUAN CARLOS ZABALA", cel: "573232911903" },
            "26": { nombre: "ROY REYES", cel: "573108480777" },
            "28": { nombre: "RUBEN ABENDAÑO", cel: "573148010448" },
            "32": { nombre: "JULIET RODRIGUEZ", cel: "573135780204" },
            "01": { nombre: "HAROLD MARIN", cel: "573117700431" },
            "02": { nombre: "DANNY TRONCOSO", cel: "573137671011" }
        };

        document.getElementById('upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const sheet = workbook.SheetNames.find(n => n.toLowerCase() === 'data') || workbook.SheetNames[0];
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheet]);
                poblarFiltros();
                procesar();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function poblarFiltros() {
            const getU = (col) => [...new Set(rawData.map(d => d[col]))].filter(x => x).sort();
            document.getElementById('selProv').innerHTML = '<option value="">TODOS LOS PROVEEDORES</option>' + getU('DESNUMPROVEE').map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('selVend').innerHTML = '<option value="">TODOS LOS VENDEDORES</option>' + getU('vendedor').filter(v => v != 12).map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function procesar() {
            const fP = document.getElementById('selProv').value;
            const fV = document.getElementById('selVend').value;

            const filtrados = rawData.filter(d => 
                (fP ? d.DESNUMPROVEE === fP : true) &&
                (fV ? d.vendedor == fV : d.vendedor != 12)
            );

            // KPI Global de Clientes Impactados
            const clientesGlobales = new Set(filtrados.map(d => d.nit).filter(n => n));
            document.getElementById('totalClientesVal').innerText = clientesGlobales.size;
            document.getElementById('totalClientesCard').classList.remove('hidden');

            let resumenVend = {}; // Agrupado por vendedor
            
            filtrados.forEach(row => {
                const cod = String(row.vendedor).padStart(2, '0');
                if(cod === "12") return;

                const prov = row.DESNUMPROVEE || 'VARIOS';
                const tipo = parseInt(row.tipo);
                const valor = parseFloat(row.tventas) || 0;

                if(!resumenVend[cod]) {
                    resumenVend[cod] = { 
                        t1: 0, t2: 0, 
                        provs: {}, 
                        clientes: new Set() 
                    };
                }

                if(!resumenVend[cod].provs[prov]) {
                    resumenVend[cod].provs[prov] = { v: 0, d: 0 };
                }

                if(tipo === 1) {
                    resumenVend[cod].t1 += valor;
                    resumenVend[cod].provs[prov].v += valor;
                } else if(tipo === 2) {
                    resumenVend[cod].t2 += valor;
                    resumenVend[cod].provs[prov].d += valor;
                }

                if(row.nit) resumenVend[cod].clientes.add(row.nit);
            });

            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';

            Object.keys(resumenVend).sort().forEach(cod => {
                const vData = resumenVend[cod];
                const info = contactos[cod] || { nombre: "Vendedor " + cod, cel: "" };
                const netoTotal = vData.t1 - vData.t2;
                const prom = netoTotal / (vData.clientes.size || 1);

                // Construcción de la lista de proveedores para la tabla y WhatsApp
                let detalleHtml = "";
                let detalleTextoWA = "";

                Object.keys(vData.provs).sort().forEach(pName => {
                    const pNeto = vData.provs[pName].v - vData.provs[pName].d;
                    detalleHtml += `<div class="text-[10px] flex justify-between border-b border-slate-50 py-0.5">
                                        <span>${pName}:</span>
                                        <span class="font-bold text-slate-700">$${pNeto.toLocaleString()}</span>
                                    </div>`;
                    detalleTextoWA += `%0A- ${pName}: $${pNeto.toLocaleString()}`;
                });

                const msgWA = `*DISTRILECO S.A.S*%0A*REPORTE CONSOLIDADO*%0A--------------------------%0AVendedor: ${info.nombre}%0A--------------------------%0ADETALLE POR PROVEEDOR:${detalleTextoWA}%0A--------------------------%0A(+) Ventas T1: $${vData.t1.toLocaleString()}%0A(-) Devoluc T2: $${vData.t2.toLocaleString()}%0A*TOTAL NETO: $${netoTotal.toLocaleString()}*%0A--------------------------%0AImpacto Clientes: ${vData.clientes.size}%0APromedio/Cliente: $${prom.toLocaleString(undefined,{maximumFractionDigits:0})}`;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="p-4">
                            <div class="font-bold text-blue-900">${info.nombre}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">CÓDIGO: ${cod}</div>
                        </td>
                        <td class="p-4 w-64">${detalleHtml}</td>
                        <td class="p-4 text-right font-black bg-blue-50 text-blue-900">$ ${netoTotal.toLocaleString()}</td>
                        <td class="p-4 text-right font-bold text-slate-600">${vData.clientes.size}</td>
                        <td class="p-4 text-right font-bold text-purple-700">$ ${prom.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
                        <td class="p-4 text-center">
                            <a href="https://wa.me/${info.cel}?text=${msgWA}" target="_blank" class="btn-whatsapp">
                                📲 Enviar Reporte
                            </a>
                        </td>
                    </tr>`;
            });

            if (Object.keys(resumenVend).length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-20 text-center text-slate-400 font-bold italic">No hay datos para esta selección.</td></tr>';
            }
        }
    </script>
</body>
</html>
