<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Dinámico - Distrileco</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .vibras-positivas-footer { border-top: 2px solid #e2e8f0; text-align: center; padding: 15px; font-weight: bold; color: #475569; margin-top: 20px; font-size: 13px; }
        .btn-whatsapp { background-color: #25D366; color: white; padding: 8px 16px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; border-radius: 99px; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-whatsapp:hover { background-color: #128C7E; transform: scale(1.05); }
        select { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-6">

    <div class="max-w-[1300px] mx-auto space-y-4">
        <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-xl flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-yellow-500">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black tracking-tighter italic">DISTRILECO S.A.S</h1>
                <p class="text-xs text-blue-300 uppercase font-bold tracking-widest">Gestión de Ventas por Proveedor</p>
            </div>
            <label class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold cursor-pointer shadow-md hover:bg-green-500 transition">
                📂 CARGAR EXCEL (GESTIONVENTAS.XLSX)
                <input type="file" id="upload" class="hidden" accept=".xlsx, .csv">
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-600">
                <label class="text-xs font-black text-blue-900 uppercase">1. Selección de Proveedores:</label>
                <select id="selProv" class="w-full mt-1 p-2 bg-blue-50 border rounded-lg font-bold text-blue-800" onchange="procesar()"><option value="">MOSTRAR TODOS LOS PROVEEDORES</option></select>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-slate-400">
                <label class="text-xs font-black text-slate-600 uppercase">2. Selección de Vendedor:</label>
                <select id="selVend" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg font-bold text-slate-700" onchange="procesar()"><option value="">TODOS (MENOS VEND 12)</option></select>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-slate-400">
                <label class="text-xs font-black text-slate-600 uppercase">3. Ref. Proveedor (Col I):</label>
                <select id="selRefI" class="w-full mt-1 p-2 bg-slate-50 border rounded-lg font-bold text-slate-700" onchange="procesar()"><option value="">TODAS LAS REFERENCIAS</option></select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider">
                        <tr>
                            <th class="p-4">Cód / Vendedor</th>
                            <th class="p-4 text-right">Venta (T1)</th>
                            <th class="p-4 text-right">Devol. (T2)</th>
                            <th class="p-4 text-right bg-blue-800">Neto Nivelado</th>
                            <th class="p-4 text-right">Venta / Cliente</th>
                            <th class="p-4 text-center">Enviar WhatsApp</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody" class="text-sm divide-y divide-slate-100">
                        <tr><td colspan="6" class="p-20 text-center text-slate-400 font-bold italic">Cargue el archivo para filtrar por proveedores...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="vibras-positivas-footer">
            app desarrollada por vibras positivas derechos de autor (3117700431)
        </footer>
    </div>

    <script>
        let rawData = [];
        
        const contactos = {
            "03": { nombre: "ALEXANDER SANCHEZ", cel: "573218037260" },
            "04": { nombre: "JUAN CARLOS QUINTANA", cel: "573204077185" },
            "06": { nombre: "LORENZO CASTELLAR", cel: "573113896092" },
            "07": { nombre: "ARGENIS MEZA", cel: "573122960169" },
            "10": { nombre: "GELYDIS ENAMORADO", cel: "573135031118" },
            "17": { nombre: "ROBERT ATENCIA", cel: "573022107387" },
            "22": { nombre: "JUAN CARLOS ZABALA", cel: "573232911903" },
            "26": { nombre: "ROY REYES", cel: "573108480777" },
            "28": { nombre: "RUBEN ABENDAÑO", cel: "573148010448" },
            "32": { nombre: "JULIET RODRIGUEZ", cel: "573135780204" },
            "01": { nombre: "HAROLD MARIN", cel: "573117700431" },
            "02": { nombre: "DANNY TRONCOSO", cel: "573137671011" }
        };

        document.getElementById('upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const sheet = workbook.SheetNames.find(n => n.toLowerCase() === 'data') || workbook.SheetNames[0];
                rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheet]);
                poblarFiltros();
                procesar();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function poblarFiltros() {
            const getUnicos = (col) => [...new Set(rawData.map(d => d[col]))].filter(x => x).sort();
            
            const sP = document.getElementById('selProv');
            sP.innerHTML = '<option value="">MOSTRAR TODOS LOS PROVEEDORES</option>';
            getUnicos('DESNUMPROVEE').forEach(p => sP.innerHTML += `<option value="${p}">${p}</option>`);

            const sV = document.getElementById('selVend');
            sV.innerHTML = '<option value="">TODOS (MENOS VEND 12)</option>';
            getUnicos('vendedor').filter(v => v != 12).forEach(v => sV.innerHTML += `<option value="${v}">${v}</option>`);

            const sR = document.getElementById('selRefI');
            sR.innerHTML = '<option value="">TODAS LAS REFERENCIAS</option>';
            getUnicos('referencia_proveedor').forEach(r => sR.innerHTML += `<option value="${r}">${r}</option>`);
        }

        function procesar() {
            const fP = document.getElementById('selProv').value;
            const fV = document.getElementById('selVend').value;
            const fR = document.getElementById('selRefI').value;

            // Filtro dinámico: Se activa según lo que usted elija en las cajitas
            const filtrados = rawData.filter(d => 
                (fP ? d.DESNUMPROVEE === fP : true) &&
                (fV ? d.vendedor == fV : d.vendedor != 12) &&
                (fR ? d.referencia_proveedor == fR : true)
            );

            let resumen = {};
            filtrados.forEach(row => {
                const cod = String(row.vendedor).padStart(2, '0');
                if(cod === "12") return;

                const tipo = parseInt(row.tipo);
                const valor = parseFloat(row.al) || 0; // Usamos columna AL para valores

                if(!resumen[cod]) resumen[cod] = { t1: 0, t2: 0, clientes: new Set(), prov: "" };
                if(tipo === 1) resumen[cod].t1 += valor;
                if(tipo === 2) resumen[cod].t2 += valor;
                if(row.nit) resumen[cod].clientes.add(row.nit);
                resumen[cod].prov = fP || "VARIOS";
            });

            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';

            Object.keys(resumen).forEach(cod => {
                const infoVend = contactos[cod] || { nombre: "Vendedor " + cod, cel: "" };
                const neto = resumen[cod].t1 - resumen[cod].t2;
                const prom = neto / (resumen[cod].clientes.size || 1);
                const provTxt = resumen[cod].prov;

                // Mensaje de WhatsApp personalizado según el proveedor elegido
                const msgWA = `*DISTRILECO S.A.S*%0A*REPORTE COMERCIAL*%0A--------------------------%0AProveedor: ${provTxt}%0AVendedor: ${infoVend.nombre}%0A--------------------------%0A(+) Ventas T1: $${resumen[cod].t1.toLocaleString()}%0A(-) Devoluc T2: $${resumen[cod].t2.toLocaleString()}%0A*NETO: $${neto.toLocaleString()}*%0A--------------------------%0AClientes Impactados: ${resumen[cod].clientes.size}%0APromedio/Cliente: $${prom.toLocaleString(undefined,{maximumFractionDigits:0})}`;

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 font-medium border-l-4 border-transparent hover:border-blue-500 transition-all">
                        <td class="p-4 text-slate-900">
                            <span class="text-[10px] bg-slate-200 px-2 py-0.5 rounded text-slate-600 mr-2 font-bold">${cod}</span>
                            ${infoVend.nombre}
                        </td>
                        <td class="p-4 text-right text-blue-600">$ ${resumen[cod].t1.toLocaleString()}</td>
                        <td class="p-4 text-right text-red-500">$ ${resumen[cod].t2.toLocaleString()}</td>
                        <td class="p-4 text-right font-black bg-blue-50 text-blue-900 shadow-inner">$ ${neto.toLocaleString()}</td>
                        <td class="p-4 text-right font-bold text-purple-700">$ ${prom.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
                        <td class="p-4 text-center">
                            <a href="https://wa.me/${infoVend.cel}?text=${msgWA}" target="_blank" class="btn-whatsapp">
                                📲 Enviar
                            </a>
                        </td>
                    </tr>
                `;
            });

            if (Object.keys(resumen).length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-400 font-bold underline italic">No hay datos para esta selección de proveedores.</td></tr>';
            }
        }
    </script>
</body>
</html>
